<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDI P Meranti - Sistem Elite</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {margin:0;font-family:Segoe UI;background:#0f172a;color:white;}
header {background:#dc2626;padding:15px;text-align:center;font-weight:bold;}
.container {padding:15px;display:grid;gap:15px;}
.card {background:#1e293b;padding:15px;border-radius:12px;}
input, textarea {width:100%;padding:10px;margin-top:8px;border:none;border-radius:8px;}
button {margin-top:10px;padding:10px;background:#dc2626;color:white;border:none;border-radius:8px;}
#map {height:300px;border-radius:10px;}
img {max-width:100px;border-radius:8px;margin-top:5px;}
.toggle {cursor:pointer;color:#ccc;margin-top:10px;}
</style>
</head>

<body>

<header>
🔴 PDI P KABUPATEN KEPULAUAN MERANTI<br>
Sistem Monitoring Kader
</header>

<div class="container">

<div class="card">

<h3>🔐 Login</h3>
<div id="loginForm">
  <input id="loginEmail" placeholder="Email">
  <input id="loginPassword" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <div class="toggle" onclick="showRegister()">Belum punya akun? Daftar</div>
</div>

<h3 style="margin-top:20px;">📝 Daftar Kader</h3>
<div id="registerForm" style="display:none;">
  <input id="regNama" placeholder="Nama Lengkap">
  <input id="regId" placeholder="ID Kader">
  <input id="regEmail" placeholder="Email">
  <input id="regHp" placeholder="Nomor HP">
  <input id="regAlamat" placeholder="Alamat">
  <input id="regPassword" type="password" placeholder="Password">
  <button onclick="signup()">Daftar</button>
  <div class="toggle" onclick="showLogin()">Sudah punya akun? Login</div>
</div>

<p id="user">Belum login</p>

</div>

<div class="card">
<h3>📩 Laporan Kader</h3>
<textarea id="masalah" placeholder="Masalah"></textarea>
<input type="file" id="foto">
<button onclick="kirim()">Kirim Laporan</button>
</div>

<div class="card">
<h3>🗺️ Map Realtime</h3>
<div id="map"></div>
</div>

<div class="card">
<h3>📋 Data Laporan</h3>
<ul id="data"></ul>
</div>

<div class="card">
<h3>🏆 Leaderboard</h3>
<ul id="leaderboard"></ul>
</div>

</div>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBSahPLj7pPM36Ktqr47sOhIJ4AhNh_yV0",
  authDomain: "partai-meranti.firebaseapp.com",
  projectId: "partai-meranti",
  storageBucket: "partai-meranti.appspot.com"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// MAP
let map = L.map('map').setView([0.99, 102.7], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let markers = [];

// TOGGLE
function showRegister(){
  document.getElementById('loginForm').style.display="none";
  document.getElementById('registerForm').style.display="block";
}
function showLogin(){
  document.getElementById('loginForm').style.display="block";
  document.getElementById('registerForm').style.display="none";
}

// LOGIN STATE
auth.onAuthStateChanged(async user=>{
  if(user){
    let doc = await db.collection("users").doc(user.uid).get();
    let data = doc.data();

    document.getElementById('user').innerText =
    "Selamat datang kader\n" + (data?.nama || "");

    document.getElementById('loginForm').style.display="none";
    document.getElementById('registerForm').style.display="none";

    document.getElementById('user').innerHTML +=
    `<br><button onclick="logout()">Logout</button>`;

    loadData();
    loadLeaderboard();
  }
});

// SIGNUP
function signup(){
  let nama = regNama.value;
  let id = regId.value;
  let email = regEmail.value;
  let hp = regHp.value;
  let alamat = regAlamat.value;
  let pass = regPassword.value;

  if(!nama || !id || !email || !hp || !alamat || !pass)
    return alert("Lengkapi semua data!");

  auth.createUserWithEmailAndPassword(email, pass)
  .then(res=>{
    db.collection("users").doc(res.user.uid).set({
      nama, id, email, hp, alamat, poin:0
    });
    alert("Akun berhasil dibuat");
    showLogin();
  });
}

// LOGIN
function login(){
  auth.signInWithEmailAndPassword(loginEmail.value, loginPassword.value)
  .catch(e=>alert(e.message));
}

// LOGOUT
function logout(){
  auth.signOut();
  location.reload();
}

// KIRIM LAPORAN
function kirim(){
  let user = auth.currentUser;
  if(!user) return alert("Login dulu!");

  let masalah = document.getElementById('masalah').value;
  let file = document.getElementById('foto').files[0];

  navigator.geolocation.getCurrentPosition(async pos=>{

    let userDoc = await db.collection("users").doc(user.uid).get();
    let nama = userDoc.data().nama;

    let fotoURL="";
    if(file){
      let ref=storage.ref("foto/"+Date.now());
      await ref.put(file);
      fotoURL=await ref.getDownloadURL();
    }

    db.collection("laporan").add({
      nama, masalah, foto:fotoURL,
      lat:pos.coords.latitude,
      lng:pos.coords.longitude,
      waktu:new Date()
    });

    db.collection("users").doc(user.uid).update({
      poin:firebase.firestore.FieldValue.increment(10)
    });

    alert("Laporan terkirim");
    masalah.value="";
  });
}

// LOAD DATA
function loadData(){
  db.collection("laporan").orderBy("waktu","desc")
  .onSnapshot(snapshot=>{
    data.innerHTML="";
    markers.forEach(m=>map.removeLayer(m));
    markers=[];

    snapshot.forEach(doc=>{
      let d=doc.data();

      let li=document.createElement('li');
      li.innerHTML=`<b>${d.nama}</b><br>${d.masalah}`;
      data.appendChild(li);

      let marker=L.marker([d.lat,d.lng]).addTo(map)
      .bindPopup(`<b>${d.nama}</b><br>${d.masalah}`);
      markers.push(marker);
    });
  });
}

// LEADERBOARD
function loadLeaderboard(){
  db.collection("users").orderBy("poin","desc")
  .onSnapshot(snapshot=>{
    leaderboard.innerHTML="";
    snapshot.forEach(doc=>{
      let d=doc.data();
      let li=document.createElement('li');
      li.innerText=d.nama+" - "+d.poin+" poin";
      leaderboard.appendChild(li);
    });
  });
}

</script>

</body>
</html>
