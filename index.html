<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDI P Meranti - Sistem Elite</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<!-- Google Maps -->
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY"></script>

<style>
body {margin:0;font-family:Segoe UI;background:#0f172a;color:white;}
header {background:#dc2626;padding:15px;text-align:center;font-weight:bold;}
.container {padding:15px;display:grid;gap:15px;}
.card {background:#1e293b;padding:15px;border-radius:12px;}
input, textarea {width:100%;padding:10px;margin-top:8px;border:none;border-radius:8px;}
button {margin-top:10px;padding:10px;background:#dc2626;color:white;border:none;border-radius:8px;}
#map {height:300px;border-radius:10px;}
img {max-width:100px;margin-top:5px;border-radius:8px;}
</style>
</head>

<body>

<header>
🔴 PDI P KABUPATEN KEPULAUAN MERANTI<br>
Sistem Monitoring Kader
</header>

<div class="container">

<div class="card">
<h3>🔐 Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<div id="authArea">
<button onclick="login()">Login</button>
<button onclick="signup()">Daftar</button>
</div>

<p id="user"></p>
</div>

<div class="card">
<h3>📩 Laporan Kader</h3>
<input id="nama" placeholder="Nama">
<textarea id="masalah" placeholder="Masalah"></textarea>
<input type="file" id="foto">
<button onclick="kirim()">Kirim Laporan</button>
</div>

<div class="card">
<h3>🗺️ Map Realtime</h3>
<div id="map"></div>
</div>

<div class="card">
<h3>📋 Data Laporan</h3>
<ul id="data"></ul>
</div>

<div class="card">
<h3>🏆 Leaderboard</h3>
<ul id="leaderboard"></ul>
</div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBSahPLj7pPM36Ktqr47sOhIJ4AhNh_yV0",
  authDomain: "partai-meranti.firebaseapp.com",
  projectId: "partai-meranti",
  storageBucket: "partai-meranti.appspot.com"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let map;
let markers = [];

function initMap(){
  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 12,
    center: { lat: 0.99, lng: 102.7 }
  });
}
initMap();


// 🔥 LOGIN STATE
auth.onAuthStateChanged(user => {
  if(user){

    document.getElementById('user').innerText =
    "Selamat datang kader PDI P Kepulauan Meranti";

    document.getElementById("authArea").innerHTML =
    `<button onclick="logout()">Logout</button>`;

    // auto create user
    db.collection("users").doc(user.uid).get().then(doc=>{
      if(!doc.exists){
        db.collection("users").doc(user.uid).set({
          email: user.email,
          poin: 0
        });
      }
    });

    loadData();
    loadLeaderboard();

  } else {
    document.getElementById('user').innerText = "Belum login";
  }
});


// AUTH
function signup(){
  auth.createUserWithEmailAndPassword(
    emailInput(), passInput()
  ).catch(e=>alert(e.message));
}

function login(){
  auth.signInWithEmailAndPassword(
    emailInput(), passInput()
  ).catch(e=>alert(e.message));
}

function logout(){
  auth.signOut();
}

function emailInput(){ return document.getElementById('email').value; }
function passInput(){ return document.getElementById('password').value; }


// 🔥 KIRIM LAPORAN + FOTO + GPS
function kirim(){
  let user = auth.currentUser;
  if(!user) return alert("Login dulu!");

  let nama = document.getElementById('nama').value;
  let masalah = document.getElementById('masalah').value;
  let file = document.getElementById('foto').files[0];

  navigator.geolocation.getCurrentPosition(async pos=>{
    let lokasi = `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;

    let fotoURL = "";

    if(file){
      let ref = storage.ref("foto/"+Date.now());
      await ref.put(file);
      fotoURL = await ref.getDownloadURL();
    }

    db.collection("laporan").add({
      nama, masalah, lokasi,
      foto: fotoURL,
      email: user.email,
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      waktu: new Date()
    });

    db.collection("users").doc(user.uid).update({
      poin: firebase.firestore.FieldValue.increment(10)
    });

    alert("✅ Laporan berhasil dikirim");
  });
}


// 🔥 LOAD DATA + MAP MARKER
function loadData(){
  db.collection("laporan").orderBy("waktu","desc")
  .onSnapshot(snapshot=>{

    document.getElementById('data').innerHTML = "";

    // hapus marker lama
    markers.forEach(m=>m.setMap(null));
    markers = [];

    snapshot.forEach(doc=>{
      let d = doc.data();

      let li = document.createElement('li');
      li.innerHTML = `
        <b>${d.nama}</b><br>
        ${d.masalah}<br>
        ${d.foto ? `<img src="${d.foto}">` : ""}
      `;
      document.getElementById('data').appendChild(li);

      // marker
      let marker = new google.maps.Marker({
        position: {lat:d.lat, lng:d.lng},
        map: map
      });

      markers.push(marker);
    });
  });
}


// 🔥 LEADERBOARD REALTIME
function loadLeaderboard(){
  db.collection("users").orderBy("poin","desc")
  .onSnapshot(snapshot=>{
    let lb = document.getElementById('leaderboard');
    lb.innerHTML = "";

    snapshot.forEach(doc=>{
      let d = doc.data();
      let li = document.createElement('li');
      li.innerText = d.email + " - " + d.poin + " poin";
      lb.appendChild(li);
    });
  });
}

</script>

</body>
</html>
