<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Partai PRO</title>  <style>
    body { margin:0; font-family: 'Segoe UI'; background:#0f172a; color:white; }
    header { background:linear-gradient(135deg,#dc2626,#7f1d1d); padding:15px; text-align:center; font-weight:bold; }
    .container { padding:15px; display:grid; gap:15px; }
    .card { background:#1e293b; padding:15px; border-radius:12px; }
    input, textarea { width:100%; padding:10px; margin-top:8px; border:none; border-radius:8px; background:#334155; color:white; }
    button { margin-top:10px; padding:10px; border:none; border-radius:8px; background:#dc2626; color:white; cursor:pointer; }
    .stat { display:flex; justify-content:space-between; }
  </style></head>
<body><header>🚀 Sistem Partai PRO</header><div class="container"><div class="card">
<h3>📊 Statistik</h3>
<div class="stat"><span>Laporan</span><span id="total">0</span></div>
<div class="stat"><span>Poin</span><span id="poin">0</span></div>
</div><div class="card">
<h3>📩 Laporan Masyarakat</h3>
<input id="nama" placeholder="Nama">
<input id="lokasi" placeholder="Lokasi (auto GPS)">
<textarea id="masalah" placeholder="Masalah"></textarea>
<button onclick="getLocation()">📍 Ambil Lokasi</button>
<button onclick="kirim()">Kirim</button>
</div><div class="card">
<h3>👥 Tugas Kader</h3>
<ul id="tugas"></ul>
</div><div class="card">
<h3>🏆 Leaderboard</h3>
<ol id="leaderboard"></ol>
</div></div><script>
let laporan = [];
let poin = 0;

function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      let lat = pos.coords.latitude;
      let lng = pos.coords.longitude;
      let maps = `https://www.google.com/maps?q=${lat},${lng}`;
      document.getElementById('lokasi').value = maps;
    });
  } else {
    alert('GPS tidak didukung');
  }
}

function kirim() {
  let data = {
    nama: document.getElementById('nama').value,
    lokasi: document.getElementById('lokasi').value,
    masalah: document.getElementById('masalah').value
  };

  laporan.push(data);
  render();
}

function render() {
  document.getElementById('total').innerText = laporan.length;
  document.getElementById('poin').innerText = poin;

  let list = document.getElementById('tugas');
  list.innerHTML = '';

  laporan.forEach((l,i)=>{
    let li = document.createElement('li');
    li.innerHTML = `
      <b>${l.nama}</b><br>
      <a href="${l.lokasi}" target="_blank">📍 Lihat Lokasi</a><br>
      ${l.masalah}<br>
      <button onclick="selesai(${i})">Selesai</button>
    `;
    list.appendChild(li);
  });

  renderLeaderboard();
}

function selesai(i){
  poin += 10;
  laporan.splice(i,1);
  render();
}

function renderLeaderboard(){
  let lb = document.getElementById('leaderboard');
  lb.innerHTML = `
    <li>Kader Kecamatan A - 120 poin</li>
    <li>Kader Desa B - 95 poin</li>
    <li>Kader Lapangan - 80 poin</li>
  `;
}
</script></body>
</html>
