<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDI P Meranti - Sistem Elite</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {margin:0;font-family:Segoe UI;background:#0f172a;color:white;}
header {background:#dc2626;padding:15px;text-align:center;font-weight:bold;}
.container {padding:15px;display:grid;gap:15px;}
.card {background:#1e293b;padding:15px;border-radius:12px;}
input, textarea {width:100%;padding:10px;margin-top:8px;border:none;border-radius:8px;}
button {margin-top:10px;padding:10px;background:#dc2626;color:white;border:none;border-radius:8px;}
#map {height:300px;border-radius:10px;}
img {max-width:100px;border-radius:8px;margin-top:5px;}
</style>
</head>

<body>

<header>
🔴 PDI P KABUPATEN KEPULAUAN MERANTI<br>
Sistem Monitoring Kader
</header>

<div class="container">

<div class="card">
<h3>🔐 Login / Daftar</h3>

<input id="namaLengkap" placeholder="Nama Lengkap (untuk daftar)">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<div id="authArea">
<button onclick="login()">Login</button>
<button onclick="signup()">Daftar</button>
</div>

<p id="user">Belum login</p>
</div>

<div class="card">
<h3>📩 Laporan Kader</h3>
<textarea id="masalah" placeholder="Masalah"></textarea>
<input type="file" id="foto">
<button onclick="kirim()">Kirim Laporan</button>
</div>

<div class="card">
<h3>🗺️ Map Realtime</h3>
<div id="map"></div>
</div>

<div class="card">
<h3>📋 Data Laporan</h3>
<ul id="data"></ul>
</div>

<div class="card">
<h3>🏆 Leaderboard</h3>
<ul id="leaderboard"></ul>
</div>

</div>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "partai-meranti.firebaseapp.com",
  projectId: "partai-meranti",
  storageBucket: "partai-meranti.appspot.com"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// MAP
let map = L.map('map').setView([0.99, 102.7], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let markers = [];

// LOGIN STATE
auth.onAuthStateChanged(async user => {
  if(user){

    let doc = await db.collection("users").doc(user.uid).get();
    let data = doc.data();

    document.getElementById('user').innerText =
    "Selamat datang kader\n" + (data?.nama || "");

    document.getElementById("authArea").innerHTML =
    `<button onclick="logout()">Logout</button>`;

    document.getElementById("email").style.display = "none";
    document.getElementById("password").style.display = "none";
    document.getElementById("namaLengkap").style.display = "none";

    loadData();
    loadLeaderboard();

  } else {
    document.getElementById('user').innerText = "Belum login";

    document.getElementById("authArea").innerHTML = `
      <button onclick="login()">Login</button>
      <button onclick="signup()">Daftar</button>
    `;
  }
});

// SIGNUP
function signup(){
  let nama = document.getElementById('namaLengkap').value;
  let email = document.getElementById('email').value;
  let pass = document.getElementById('password').value;

  auth.createUserWithEmailAndPassword(email, pass)
  .then(res=>{
    db.collection("users").doc(res.user.uid).set({
      nama,
      email,
      poin: 0
    });
    alert("Akun dibuat");
  })
  .catch(e=>alert(e.message));
}

// LOGIN
function login(){
  auth.signInWithEmailAndPassword(
    document.getElementById('email').value,
    document.getElementById('password').value
  );
}

// LOGOUT
function logout(){
  auth.signOut();
}

// KIRIM
function kirim(){
  let user = auth.currentUser;
  if(!user) return alert("Login dulu");

  let masalah = document.getElementById('masalah').value;
  let file = document.getElementById('foto').files[0];

  navigator.geolocation.getCurrentPosition(async pos=>{

    let userDoc = await db.collection("users").doc(user.uid).get();
    let nama = userDoc.data().nama;

    let fotoURL = "";

    if(file){
      let ref = storage.ref("foto/"+Date.now());
      await ref.put(file);
      fotoURL = await ref.getDownloadURL();
    }

    db.collection("laporan").add({
      nama,
      masalah,
      foto: fotoURL,
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      waktu: new Date()
    });

    db.collection("users").doc(user.uid).update({
      poin: firebase.firestore.FieldValue.increment(10)
    });

    document.getElementById('masalah').value = "";
    alert("Laporan terkirim");
  });
}

// LOAD DATA
function loadData(){
  db.collection("laporan").orderBy("waktu","desc")
  .onSnapshot(snapshot=>{

    document.getElementById('data').innerHTML = "";

    markers.forEach(m=>map.removeLayer(m));
    markers = [];

    let first = true;

    snapshot.forEach(doc=>{
      let d = doc.data();

      let li = document.createElement('li');
      li.innerHTML = `
        <b>${d.nama}</b><br>
        ${d.masalah}<br>
        ${d.foto ? `<img src="${d.foto}">` : ""}
      `;
      document.getElementById('data').appendChild(li);

      let marker = L.marker([d.lat, d.lng]).addTo(map)
      .bindPopup(`
        <b>${d.nama}</b><br>
        ${d.masalah}<br>
        ${d.foto ? `<img src="${d.foto}" width="100">` : ""}
      `);

      if(first){
        map.setView([d.lat, d.lng], 15);
        first = false;
      }

      markers.push(marker);
    });
  });
}

// LEADERBOARD
function loadLeaderboard(){
  db.collection("users").orderBy("poin","desc")
  .onSnapshot(snapshot=>{
    let lb = document.getElementById('leaderboard');
    lb.innerHTML = "";

    snapshot.forEach(doc=>{
      let d = doc.data();
      let li = document.createElement('li');
      li.innerText = d.nama + " - " + d.poin + " poin";
      lb.appendChild(li);
    });
  });
}

</script>

</body>
</html>
