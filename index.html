<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDI P Meranti - Dashboard Elite</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
body {margin:0;font-family:Segoe UI;background:#0f172a;color:white;}
header {background:#dc2626;padding:15px;text-align:center;font-weight:bold;}
.container {padding:15px;display:grid;gap:15px;}
.card {background:#1e293b;padding:15px;border-radius:12px;}
input, textarea {width:100%;padding:10px;margin-top:8px;border:none;border-radius:8px;}
button {margin-top:10px;padding:10px;background:#dc2626;color:white;border:none;border-radius:8px;}
ul {padding-left:20px;}
</style>
</head>

<body>

<header>
🔴 PDI P KABUPATEN KEPULAUAN MERANTI<br>
Dashboard Elite Kader
</header>

<div class="container">

<div class="card">
<h3>🔐 Login / Signup</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<div id="authArea">
<button onclick="login()">Login</button>
<button onclick="signup()">Daftar</button>
</div>

<p id="user">Belum login</p>
</div>

<div class="card">
<h3>📩 Input Laporan</h3>
<input id="nama" placeholder="Nama">
<textarea id="masalah" placeholder="Masalah"></textarea>
<button onclick="kirim()">Kirim Laporan</button>
</div>

<div class="card">
<h3>📋 Data Laporan</h3>
<ul id="data"></ul>
</div>

<div class="card">
<h3>🏆 Leaderboard</h3>
<ul id="leaderboard"></ul>
</div>

<div class="card">
<h3>🗺️ Map Lokasi</h3>
<iframe id="map" width="100%" height="300"></iframe>
</div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBSahPLj7pPM36Ktqr47sOhIJ4AhNh_yV0",
  authDomain: "partai-meranti.firebaseapp.com",
  projectId: "partai-meranti"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();


// 🔥 AUTO LOGIN + UI DINAMIS
auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById('user').innerText = "Login: " + user.email;

    document.getElementById("authArea").innerHTML = `
      <button onclick="logout()">Logout</button>
    `;

    loadData();
    loadLeaderboard();

  } else {
    document.getElementById('user').innerText = "Belum login";

    document.getElementById("authArea").innerHTML = `
      <button onclick="login()">Login</button>
      <button onclick="signup()">Daftar</button>
    `;
  }
});


// SIGNUP
function signup(){
  let email = emailInput();
  let pass = passInput();

  if(!email || !pass) return alert("Isi email & password");

  auth.createUserWithEmailAndPassword(email, pass)
  .then(res=>{
    db.collection("users").doc(res.user.uid).set({
      email: email,
      poin: 0
    });
    alert("✅ Akun berhasil dibuat");
  })
  .catch(err=>alert(err.message));
}


// LOGIN
function login(){
  auth.signInWithEmailAndPassword(emailInput(), passInput())
  .catch(err=>alert(err.message));
}


// LOGOUT
function logout(){
  auth.signOut();
}


// 🔥 INPUT AUTO
function emailInput(){ return document.getElementById('email').value; }
function passInput(){ return document.getElementById('password').value; }


// 🔥 KIRIM LAPORAN (LOKASI OTOMATIS)
function kirim(){
  let user = auth.currentUser;
  if(!user) return alert("Login dulu!");

  let nama = document.getElementById('nama').value;
  let masalah = document.getElementById('masalah').value;

  if(!nama || !masalah) return alert("Lengkapi data!");

  navigator.geolocation.getCurrentPosition(pos=>{
    let lokasi = `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;

    db.collection("laporan").add({
      nama, lokasi, masalah,
      email: user.email,
      waktu: new Date()
    });

    db.collection("users").doc(user.uid).update({
      poin: firebase.firestore.FieldValue.increment(10)
    });

    alert("✅ Laporan berhasil dikirim!");

    document.getElementById('nama').value = "";
    document.getElementById('masalah').value = "";
  });
}


// LOAD DATA REALTIME
function loadData(){
  db.collection("laporan").orderBy("waktu","desc")
  .onSnapshot(snapshot=>{
    let list = document.getElementById('data');
    list.innerHTML = "";

    snapshot.forEach(doc=>{
      let d = doc.data();

      let li = document.createElement('li');
      li.innerHTML = `
        <b>${d.nama}</b><br>
        <a href="${d.lokasi}" target="_blank">📍 Lokasi</a><br>
        ${d.masalah}
      `;
      list.appendChild(li);

      document.getElementById("map").src =
        d.lokasi.replace("maps.google.com","www.google.com/maps/embed");
    });
  });
}


// LEADERBOARD REALTIME
function loadLeaderboard(){
  db.collection("users").orderBy("poin","desc").limit(10)
  .onSnapshot(snapshot=>{
    let lb = document.getElementById('leaderboard');
    lb.innerHTML = "";

    snapshot.forEach(doc=>{
      let d = doc.data();
      let li = document.createElement('li');
      li.innerText = d.email + " - " + d.poin + " poin";
      lb.appendChild(li);
    });
  });
}

</script>

</body>
</html>
