<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDI P Meranti - Sistem PRO</title>  <!-- FIREBASE COMPAT (WAJIB) -->  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>  <style>
    body { margin:0; font-family:Segoe UI; background:#0f172a; color:white; }
    header { background:#dc2626; padding:15px; text-align:center; }
    .container { padding:15px; display:grid; gap:15px; }
    .card { background:#1e293b; padding:15px; border-radius:12px; }
    input, textarea { width:100%; padding:10px; margin-top:8px; border:none; border-radius:8px; }
    button { margin-top:10px; padding:10px; background:#dc2626; color:white; border:none; border-radius:8px; }
  </style></head>
<body><header>
🔴 PDI P KABUPATEN KEPULAUAN MERANTI<br>
Sistem Login & Monitoring Kader
</header><div class="container"><div class="card">
<h3>🔐 Login Kader</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="user"></p>
</div><div class="card">
<h3>📩 Input Laporan</h3>
<input id="nama" placeholder="Nama">
<input id="lokasi" placeholder="Lokasi">
<textarea id="masalah" placeholder="Masalah"></textarea>
<button onclick="getLocation()">📍 Ambil Lokasi</button>
<button onclick="kirim()">Kirim</button>
</div><div class="card">
<h3>📋 Data Laporan (Realtime)</h3>
<ul id="data"></ul>
</div></div><script>

// 🔥 CONFIG DARI FIREBASE (PASTE PUNYA KAMU)
const firebaseConfig = {
  apiKey: "PASTE_API_KEY_KAMU",
  authDomain: "PASTE_AUTH_DOMAIN",
  projectId: "PASTE_PROJECT_ID"
};

// INIT FIREBASE
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// LOGIN
function login(){
  let email = document.getElementById('email').value;
  let pass = document.getElementById('password').value;

  auth.signInWithEmailAndPassword(email, pass)
  .then(user=>{
    document.getElementById('user').innerText = "Login: " + user.user.email;
    loadData();
  })
  .catch(err=>alert(err.message));
}

// GPS
function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    let link = `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
    document.getElementById('lokasi').value = link;
  });
}

// SIMPAN DATA
function kirim(){
  let data = {
    nama: document.getElementById('nama').value,
    lokasi: document.getElementById('lokasi').value,
    masalah: document.getElementById('masalah').value,
    waktu: new Date()
  };

  db.collection("laporan").add(data).then(()=>{
    alert("Laporan tersimpan");
  });
}

// LOAD DATA REALTIME
function loadData(){
  db.collection("laporan").orderBy("waktu","desc")
  .onSnapshot(snapshot=>{
    let list = document.getElementById('data');
    list.innerHTML = "";

    snapshot.forEach(doc=>{
      let d = doc.data();
      let li = document.createElement('li');
      li.innerHTML = `
        <b>${d.nama}</b><br>
        <a href="${d.lokasi}" target="_blank">📍 Lokasi</a><br>
        ${d.masalah}
      `;
      list.appendChild(li);
    });
  });
}

</script></body>
</html>
