<!DOCTYPE html>
<html>
<head>
  <title>Lapor Banteng</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      max-width: 500px;
      margin: auto;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      background: #E31E25;
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 8px;
      font-weight: bold;
    }
    img {
      max-width: 100%;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Lapor Banteng</h2>

  <input id="nama" placeholder="Nama Anda">
  <input id="hp" placeholder="No HP">
  <input id="lokasi" placeholder="Kecamatan / Desa">
  
  <textarea id="laporan" placeholder="Tulis laporan..." rows="4"></textarea>

  <input type="file" id="foto">

  <img id="preview" style="display:none">

  <button onclick="kirim()">Kirim Laporan</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "APIKEY",
  authDomain: "partai-meranti.firebaseapp.com",
  projectId: "partai-meranti"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 AMBIL UID DARI QR
const params = new URLSearchParams(window.location.search);
const ref = params.get("ref");

// PREVIEW FOTO
document.getElementById("foto").onchange = function(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(ev) {
    const img = document.getElementById("preview");
    img.src = ev.target.result;
    img.style.display = "block";
  };

  if (file) reader.readAsDataURL(file);
};

async function uploadCloudinary(file) {
  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "partai_upload");

  const res = await fetch("https://api.cloudinary.com/v1_1/dpdq2a9us/image/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  return data.secure_url;
}

async function kirim() {
  const nama = document.getElementById("nama").value;
  const hp = document.getElementById("hp").value;
  const lokasi = document.getElementById("lokasi").value;
  const laporan = document.getElementById("laporan").value;
  const file = document.getElementById("foto").files[0];

  if (!nama || !hp || !laporan) {
    alert("Lengkapi data!");
    return;
  }

  let fotoUrl = "";

  // 🔥 Upload foto ke Cloudinary
  if (file) {
    fotoUrl = await uploadCloudinary(file);
  }

  // 🔥 Ambil GPS
  navigator.geolocation.getCurrentPosition(async pos => {

    await db.collection("laporan").add({
      nama,
      hp,
      lokasi,
      laporan,
      foto: fotoUrl,
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      refUser: ref,
      waktu: new Date()
    });

    // 🔥 TAMBAH POIN KE PEMILIK QR
    if (ref) {
      await db.collection("users").doc(ref).update({
        poin: firebase.firestore.FieldValue.increment(10)
      });
    }

    alert("Laporan berhasil dikirim!");
    location.reload();

  }, () => {
    alert("GPS gagal, tetap kirim tanpa lokasi");

    db.collection("laporan").add({
      nama,
      hp,
      lokasi,
      laporan,
      foto: fotoUrl,
      refUser: ref,
      waktu: new Date()
    });

    alert("Terkirim!");
  });
}
</script>

</body>
</html>
